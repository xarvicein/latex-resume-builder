services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: resumetex-server
    restart: unless-stopped
    environment:
      PORT: 4000
      LATEX_ENGINE: tectonic
      # nginx (the "client" service below) proxies /api same-origin, so browsers never
      # call this server directly in the Docker setup — but keep CORS open for local
      # debugging (e.g. hitting http://localhost:4000/api directly).
      CLIENT_ORIGIN: "http://localhost:8080"
    ports:
      - "4000:4000" # optional: lets you curl the API directly from the host
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - resumetex

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: resumetex-client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - resumetex

networks:
  resumetex:
    driver: bridge
